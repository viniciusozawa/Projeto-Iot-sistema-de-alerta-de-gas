spring.application.name=alert

# ?? Servidor ??????????????????????????????????
server.port=8080

# ?? MySQL ?????????????????????????????????????
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ?? JPA ???????????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ?? HiveMQ ????????????????????????????????????
hivemq.host=${HIVEMQ_HOST}
hivemq.port=${HIVEMQ_PORT}
hivemq.username=${HIVEMQ_USER}
hivemq.password=${HIVEMQ_PASSWORD}

# ?? MQTT Tópicos ??????????????????????????????
mqtt.topic.leitura=sensores/gas/leitura
mqtt.topic.alerta=sensores/gas/alerta
mqtt.topic.status=sensores/gas/status